# profiles.yml — このディレクトリを --profiles-dir に指定して使う
#   例: uv run dbt build --profiles-dir .
#
# 出力先は社内 datum の Snowflake (datum 標準の env-var + キーペア認証)。
# 必要な環境変数 (.env.sample 参照): SF_ACCOUNT / SF_USER / SF_PRIVATE_KEY_PATH
jaffle_shop:
  target: snowflake
  outputs:
    snowflake:
      type: snowflake
      account: "{{ env_var('SF_ACCOUNT') }}"
      user: "{{ env_var('SF_USER') }}"
      private_key_path: "{{ env_var('SF_PRIVATE_KEY_PATH') }}"
      role: "{{ env_var('SF_ROLE') }}"
      database: "{{ env_var('SF_DATABASE') }}"
      warehouse: "{{ env_var('SF_WAREHOUSE') }}"
      schema: "{{ env_var('SF_SCHEMA') }}"   # 源泉は <SF_SCHEMA>_raw、モデルは SF_SCHEMA
      threads: 8
      client_session_keep_alive: false
