# 源泉の宣言。sources に1ブロック足すだけで源泉が増える。使い方は README 参照。

# 生成ペース。「1分にN件」で指定(update_per_min を省くと更新なし)
profiles:
  slow:   { new_per_min: 0.05, update_per_min: 0.01 }     # 新規20分に1 / 更新100分に1
  medium: { new_per_min: 0.2,  update_per_min: 0.0333 }   # 新規5分に1  / 更新30分に1
  fast:   { new_per_min: 2 }                               # 新規30秒に1

sources:
  customers:
    tick: medium
    raw_style: upsert          # PK で merge。変更行だけ last_loaded_at が進む
    primary_key: customer_id
    seed: 50                   # 初回投入件数
    fields:
      customer_id: { gen: uuid }
      name:        { gen: faker, method: name }
      email:       { gen: faker, method: email }
      cohort:      { gen: choice, choices: [bronze, silver, gold], weights: [70, 25, 5], mutable: true }
      created_at:  { gen: now }

  orders:
    tick: fast
    raw_style: append          # 追記のみ
    primary_key: order_id
    seed: 50
    fields:
      order_id:    { gen: uuid }
      customer_id: { gen: ref, source: customers, field: customer_id }
      order_total: { gen: int, min: 3, max: 50 }
      ordered_at:  { gen: recent, within_days: 14 }
