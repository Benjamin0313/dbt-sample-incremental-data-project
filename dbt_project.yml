name: jaffle_shop

profile: jaffle_shop

model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

# 源泉(raw)は CSV シードではなく datagen マクロが生成する。
# dbt run / dbt build のたびに on-run-start でトランザクションが約50件増える。
# 件数を変えたいときは generate_raw_data(n_orders=...) を調整。
on-run-start:
  - "{{ generate_raw_data(n_orders=50) }}"

models:
  jaffle_shop:
    # staging は view、marts は table (orders_inc は config で incremental)
    staging:
      +materialized: view
    marts:
      +materialized: table
