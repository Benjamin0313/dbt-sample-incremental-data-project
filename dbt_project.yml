name: jaffle_shop

profile: jaffle_shop

model-paths: ["models"]
clean-targets:
  - "target"
  - "dbt_packages"

# 源泉は generate.py(datagen.yml)が生成する。dbt は変換のみ。
#   uv run python generate.py && uv run dbt build

models:
  jaffle_shop:
    # staging は view、marts は table (orders_inc は config で incremental)
    staging:
      +materialized: view
    marts:
      +materialized: table
